version: "3.9"

services:
  # ── Main PostgreSQL (mockdb) ─────────────────────────────────
  postgres:
    image: postgres:16
    container_name: pg_mock_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: mockdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mockdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - shared-net

  # ── MySQL – Company A (SolarTech Industries) ─────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql_company_a
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin1234
      MYSQL_DATABASE: company_a_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./seed_mysql.sql:/docker-entrypoint-initdb.d/seed_mysql.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot1234"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - default
      - shared-net

  # ── PostgreSQL 2 – Company B (NorthStar Logistics) ───────────
  postgres2:
    image: postgres:16
    container_name: pg_company_b
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: company_b_db
    ports:
      - "5433:5432"
    volumes:
      - pg2_data:/var/lib/postgresql/data
      - ./seed_pg2.sql:/docker-entrypoint-initdb.d/seed_pg2.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d company_b_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - shared-net

  # ── Cron importer ─────────────────────────────────────────────
  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    container_name: cron_importer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      postgres2:
        condition: service_healthy
    environment:
      # mockdb connection
      MOCKDB_HOST: postgres
      MOCKDB_PORT: 5432
      MOCKDB_USER: admin
      MOCKDB_PASS: admin1234
      MOCKDB_NAME: mockdb
      # MySQL (Company A)
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: admin
      MYSQL_PASS: admin1234
      MYSQL_DB: company_a_db
      # PostgreSQL 2 (Company B)
      PG2_HOST: postgres2
      PG2_PORT: 5432
      PG2_USER: admin
      PG2_PASS: admin1234
      PG2_DB: company_b_db

networks:
  shared-net:
    external: true

volumes:
  pg_data:
  mysql_data:
  pg2_data:
